name: Release

on:
  push:
    tags:
      # 匹配如 1.0.0, 1.0.0-dev, 2.0.0-alpha 等标签
      - '[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    outputs:
      trip_version: ${{ env.TRIP_VERSION }}
    steps:
      - name: Get the release version from the tag
        shell: bash
        if: env.TRIP_VERSION == ''
        run: |
          echo "TRIP_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "version is: ${{ env.TRIP_VERSION }}"

  build-release:
    name: Build ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_VERBOSE: true
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false # 即使某个平台失败，也让其他平台继续跑，方便排查问题
      matrix:
        include:
          # Linux Targets
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            build_type: native
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            build_type: native
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            build_type: cross
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            build_type: cross
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-24.04
            build_type: cross

          # Windows Targets
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            build_type: native
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            build_type: native

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux only)
        if: ${{ matrix.os == 'ubuntu-24.04' }}
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked
          echo "CARGO=cross" >> $GITHUB_ENV
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

      - name: Configure for Windows (Native)
        if: ${{ matrix.os == 'windows-2022' }}
        shell: bash
        run: |
          echo "CARGO=cargo" >> $GITHUB_ENV
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

      # 【核心修复】强制使用 bash，并加上引号，彻底解决 Windows PowerShell 报错
      - name: Build release binary
        shell: bash
        run: |
          echo "Running: ${{ env.CARGO }} build --verbose --release ${{ env.TARGET_FLAGS }}"
          "${{ env.CARGO }}" build --verbose --release ${{ env.TARGET_FLAGS }}

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist
          VERSION="${{ needs.create-release.outputs.trip_version }}"

          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            BINARY_NAME="trippy.exe"
            ARCHIVE_NAME="trippy-${VERSION}-${{ matrix.target }}.zip"
            7z a -tzip "dist/$ARCHIVE_NAME" "$TARGET_DIR/release/$BINARY_NAME"
          else
            BINARY_NAME="trippy"
            ARCHIVE_NAME="trippy-${VERSION}-${{ matrix.target }}.tar.gz"
            tar czf "dist/$ARCHIVE_NAME" -C "$TARGET_DIR/release" "$BINARY_NAME"
          fi

      - name: Create Packages (RPM/Deb)
        if: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}
        shell: bash
        run: |
          VERSION="${{ needs.create-release.outputs.trip_version }}"

          # Build RPM
          cargo install cargo-generate-rpm
          cargo generate-rpm -p crates/trippy --target ${{ matrix.target }} -o "dist/trippy-${VERSION}-x86_64.rpm"

          # Build Deb
          cargo install cargo-deb
          cargo deb -p trippy --target ${{ matrix.target }} --output "dist/trippy_${VERSION}_amd64.deb"

      # 最终统一上传 dist 目录下的所有文件
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: dist/*
          draft: false
          # 【预发布支持】如果 Tag 包含 -dev, -alpha, -beta，自动标记为预发布
          prerelease: ${{ contains(github.ref_name, '-dev') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: false
