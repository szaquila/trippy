name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    outputs:
      trip_version: ${{ env.TRIP_VERSION }}
    steps:
      - name: Get the release version from the tag
        shell: bash
        if: env.TRIP_VERSION == ''
        run: |
          echo "TRIP_VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          echo "version is: ${{ env.TRIP_VERSION }}"

  build-release:
    name: Build Release Assets
    needs: create-release
    runs-on: ${{ matrix.os }}
    env:
      CARGO: cargo
      TARGET_FLAGS: ''
      TARGET_DIR: ./target
      CROSS_NO_WARNINGS: 0
      RUST_BACKTRACE: 1
    strategy:
      matrix:
        build:
          [
            x86_64-linux-gnu,
            x86_64-linux-musl,
            aarch64-linux-gnu,
            aarch64-linux-musl,
            armv7-linux-gnueabihf,
            armv7-linux-musleabihf,
            armv7-linux-musleabi,
            x86_64-apple-darwin,
            aarch64-apple-darwin,
            x86_64-pc-windows-msvc,
            x86_64-pc-windows-gnu,
            aarch64-pc-windows-msvc,
            x86_64-netbsd,
            x86_64-freebsd,
          ]
        include:
          # Linux (x86_64 & aarch64)
          - build: x86_64-linux-gnu
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - build: x86_64-linux-musl
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
          - build: aarch64-linux-gnu
            os: ubuntu-24.04
            target: aarch64-unknown-linux-gnu
          - build: aarch64-linux-musl
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
          # Linux (armv7)
          - build: armv7-linux-gnueabihf
            os: ubuntu-24.04
            target: armv7-unknown-linux-gnueabihf
          - build: armv7-linux-musleabihf
            os: ubuntu-24.04
            target: armv7-unknown-linux-musleabihf
          - build: armv7-linux-musleabi
            os: ubuntu-24.04
            target: armv7-unknown-linux-musleabi
          # macOS
          - build: x86_64-apple-darwin
            os: macos-latest
            target: x86_64-apple-darwin
          - build: aarch64-apple-darwin
            os: macos-latest
            target: aarch64-apple-darwin
          # Windows
          - build: x86_64-pc-windows-msvc
            os: windows-2022
            target: x86_64-pc-windows-msvc
          - build: x86_64-pc-windows-gnu
            os: ubuntu-24.04
            target: x86_64-pc-windows-gnu
          - build: aarch64-pc-windows-msvc
            os: windows-2022
            target: aarch64-pc-windows-msvc
          # BSD
          - build: x86_64-netbsd
            os: ubuntu-24.04
            target: x86_64-unknown-netbsd
          - build: x86_64-freebsd
            os: ubuntu-24.04
            target: x86_64-unknown-freebsd

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 【优化1】使用 dtolnay/rust-toolchain 替代过时的 actions-rs
      # 它会自动读取项目根目录的 rust-toolchain.toml，如果没有则使用 stable
      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # 【优化2】使用 rust-cache 加速构建
      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # 【优化3】增加 --locked 参数防止依赖突变
      - name: Use Cross
        shell: bash
        run: |
          cargo install cross --git https://github.com/cross-rs/cross --locked
          echo "CARGO=cross" >> $GITHUB_ENV
          echo "TARGET_FLAGS=--target ${{ matrix.target }}" >> $GITHUB_ENV
          echo "TARGET_DIR=./target/${{ matrix.target }}" >> $GITHUB_ENV

      - name: Show command used for Cargo
        run: |
          echo "cargo command is: ${{ env.CARGO }}"
          echo "target flag is: ${{ env.TARGET_FLAGS }}"
          echo "target dir is: ${{ env.TARGET_DIR }}"

      - name: Build release binary
        run: ${{ env.CARGO }} build --verbose --release ${{ env.TARGET_FLAGS }}

      - name: Build archive
        shell: bash
        run: |
          staging="trippy-${{ needs.create-release.outputs.trip_version }}-${{ matrix.target }}"
          mkdir -p "$staging"
          if [ "${{ matrix.os }}" = "windows-2022" ] || [ "${{ matrix.build }}" = "x86_64-pc-windows-gnu" ]; then
            cp "target/${{ matrix.target }}/release/trip.exe" "$staging/"
            7z a -tzip "$staging.zip" "$staging"
            echo "ASSET=$staging.zip" >> $GITHUB_ENV
          else
            cp "target/${{ matrix.target }}/release/trip" "$staging/"
            tar czf "$staging.tar.gz" "$staging"
            echo "ASSET=$staging.tar.gz" >> $GITHUB_ENV
          fi

      - name: Build RPM package
        shell: bash
        if: startsWith(matrix.build, 'x86_64-linux-gnu')
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm -p crates/trippy --target ${{ matrix.target }} -o target/${{ matrix.target }}/generate-rpm/trippy-${{ needs.create-release.outputs.trip_version }}-x86_64.rpm

      - name: Create Debian package
        shell: bash
        if: startsWith(matrix.build, 'x86_64-linux-gnu') || startsWith(matrix.build, 'x86_64-linux-musl')
        run: |
          cargo install cargo-deb
          cargo deb -p trippy --target ${{ matrix.target }} --deb-version ${{ needs.create-release.outputs.trip_version }}
          case ${{ matrix.target }} in
            aarch64-*-linux-*) DPKG_ARCH=arm64 ;;
            arm-*-linux-*hf) DPKG_ARCH=armhf ;;
            i686-*-linux-*) DPKG_ARCH=i686 ;;
            x86_64-*-linux-*) DPKG_ARCH=amd64 ;;
            *) DPKG_ARCH=notset ;;
          esac;
          echo "DPKG_ARCH=${DPKG_ARCH}" >> $GITHUB_ENV

      # 【优化4】使用 softprops/action-gh-release 统一处理所有资产上传
      # 这个 Action 会自动处理 Release 的创建和文件上传，无需手动获取 upload_url
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ${{ env.ASSET }}
            target/${{ matrix.target }}/generate-rpm/trippy-${{ needs.create-release.outputs.trip_version }}-x86_64.rpm
            target/${{ matrix.target }}/debian/trippy_${{ needs.create-release.outputs.trip_version }}_${{ env.DPKG_ARCH }}.deb
          draft: false
          prerelease: false
